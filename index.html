<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計算の工夫トレーニング：学年・単元別</title>
   <script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    chtml: { displayAlign: 'left' }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --error: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.3rem; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 25px; }
        
        /* 学年セクションのデザイン */
        .grade-section { margin-bottom: 30px; }
        .grade-title { font-weight: bold; font-size: 1.1rem; color: #555; margin-bottom: 12px; padding-left: 8px; border-left: 5px solid #aaa; background: #eee; padding: 5px 10px; border-radius: 0 5px 5px 0; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-btn { padding: 15px 10px; font-size: 0.95rem; background: white; border: 2.2px solid var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; min-height: 55px; line-height: 1.3; }
        .menu-btn:hover { background: var(--primary); color: white; }

        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-to-menu { padding: 6px 12px; font-size: 0.8rem; background: #f0f0f0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .question { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary); }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; background: white; font-size: 1.1rem; cursor: pointer; text-align: left; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
        .correct { background: #e6f4ea; border: 1px solid var(--success); color: #1e7e34; }
        .wrong { background: #fce8e8; border: 1px solid var(--error); color: #a71d2a; }
        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; display: none; cursor: pointer; }
        .hidden { display: none; }
        @media (max-width: 480px) { .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" style="text-align:center; padding:50px;">データを読み込み中...</div>

    <div id="menu-screen" class="hidden">
        <h1>計算の工夫トレーニング</h1>
        <div id="grade-container"></div> </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div id="progress" style="font-weight:bold; font-size:0.9rem;"></div>
            <button class="back-to-menu" onclick="confirmBack()">🏠 メニューへ</button>
        </div>
        <div class="question" id="q-text"></div>
        <div class="options" id="options"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">次へ進む</button>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 style="color: var(--success);">クリア！</h2>
        <div id="result-text" style="font-size: 1.8rem; margin: 25px 0; font-weight: bold;"></div>
        <button class="menu-btn" style="width: 100%;" onclick="showMenu()">他のパックに挑戦</button>
    </div>
</div>

<script>
    /* ⚠️ 設定エリア */
    const SPREADSHEET_ID = '1WdkMMX6BOCfwCPkKL7zmRCFOZYZx_ZYjettgS29EFSE';
    const SHEET_NAME = 'シート1'; 
    const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

    let allData = [];
    let currentPack = [];
    let currentIdx = 0;
    let score = 0;

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const text = await response.text();
            const rows = text.split('\n').map(row => {
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });
            allData = rows.slice(1).filter(row => row.length >= 6 && row[0] !== "");
            buildCategorizedMenu();
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        } catch (error) {
            document.getElementById('loading-screen').innerText = "エラー：公開設定を確認してください。";
        }
    }

    function buildCategorizedMenu() {
        const container = document.getElementById('grade-container');
        container.innerHTML = "";
        const rawUnits = [...new Set(allData.map(row => row[0]))];
        const categories = {};

        rawUnits.forEach(rawName => {
            const parts = rawName.split('：');
            const grade = parts.length > 1 ? parts[0] : "その他";
            const unit = parts.length > 1 ? parts[1] : parts[0];
            if (!categories[grade]) categories[grade] = [];
            categories[grade].push({ fullName: rawName, displayName: unit });
        });

        for (const grade in categories) {
            const section = document.createElement('div');
            section.className = "grade-section";
            const title = document.createElement('div');
            title.className = "grade-title";
            title.innerText = grade;
            section.appendChild(title);
            const grid = document.createElement('div');
            grid.className = "menu-grid";
            categories[grade].forEach(item => {
                const btn = document.createElement('button');
                btn.className = "menu-btn";
                btn.innerText = item.displayName;
                btn.onclick = () => startQuiz(item.fullName);
                grid.appendChild(btn);
            });
            section.appendChild(grid);
            container.appendChild(section);
        }
    }

    function startQuiz(fullName) {
        const filtered = allData.filter(row => row[0] === fullName);
        if (filtered.length < 5) {
            alert(`「${fullName}」の問題が5問未満です。`);
            return;
        }
        currentPack = filtered.sort(() => Math.random() - 0.5).slice(0, 5);
        currentIdx = 0; score = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    async function loadQuestion() {
        const row = currentPack[currentIdx];
        document.getElementById('progress').innerText = `${currentPack[0][0].split('：')[1] || currentPack[0][0]}：${currentIdx + 1} / 5`;
        
        const qElement = document.getElementById('q-text');
        qElement.innerHTML = row[1].trim(); 
        
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = "";
        
        [row[2], row[3], row[4]].forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerHTML = text.trim();
            btn.onclick = () => check(i, parseInt(row[5]));
            optContainer.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        // 数式変換が終わるまで待機
        if (window.MathJax) {
            await MathJax.typesetPromise();
        }
    }

    async function check(userIdx, correctIdx) {
        const f = document.getElementById('feedback');
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach(b => b.disabled = true);
        
        f.style.display = 'block';
        if(userIdx === correctIdx) {
            score++;
            f.className = 'feedback correct';
            f.innerHTML = `<strong>正解！✨</strong><br>${currentPack[currentIdx][6]}`;
        } else {
            f.className = 'feedback wrong';
            f.innerHTML = `<strong>不正解...</strong><br>解説：${currentPack[currentIdx][6]}`;
            buttons[correctIdx].style.borderColor = "var(--success)";
            buttons[correctIdx].style.borderStyle = "dashed";
        }

        // 解説内の数式も変換
        if (window.MathJax) {
            await MathJax.typesetPromise();
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 5) loadQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-text').innerText = `${score} / 5 正解`;
    }

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
    }

    function confirmBack() {
        if(confirm("メニューに戻りますか？")) showMenu();
    }

    fetchData();
</script>
</body>
</html>
